{% extends "books_base.html" %}
{% block content %}
<div class="container" style="margin-top: 30px; max-width: 500px;">
    <h3>Edit Shelf Settings</h3>
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            {{ form.as_p }}
        </div>
        <button type="submit" style="background: #28a745; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">Save Changes</button>
        <a href="{% url 'balance' pk=bookshelf.pk %}" style="margin-left: 10px; color: #666;">Cancel</a>
    </form>
</div>
{% endblock %}
